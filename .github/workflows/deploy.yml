name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy files to VPS
        run: |
          rsync -avz \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="storage/" \
            --exclude="template/" \
            -e "ssh -p ${{ secrets.VPS_PORT }} -i ~/.ssh/id_ed25519" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/voxelswarm/

      - name: Run server post-deploy commands
        run: |
          ssh -p ${{ secrets.VPS_PORT }} -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            chown -R www-data:www-data /var/www/voxelswarm
            find /var/www/voxelswarm -type d -exec chmod 755 {} \;
            find /var/www/voxelswarm -type f -exec chmod 644 {} \;

            chown -R www-data:www-data /var/www/voxelswarm/storage || true
            chown -R www-data:www-data /var/www/voxelswarm/template || true

            nginx -t
            systemctl reload nginx
            systemctl restart php8.3-fpm
          EOF